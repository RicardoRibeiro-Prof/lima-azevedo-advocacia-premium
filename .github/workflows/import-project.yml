name: Importar projeto

on:
  push:
    branches:
      - main
    paths:
      - '.project-parts/**'
      - '.github/workflows/import-project.yml'

permissions:
  contents: write

jobs:
  import-project:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Reconstruir arquivos do projeto
        shell: bash
        run: |
          set -euo pipefail
          cat .project-parts/part-* > /tmp/project.tar.gz.b64
          base64 --decode /tmp/project.tar.gz.b64 > /tmp/project.tar.gz
          tar -xzf /tmp/project.tar.gz -C .
          rm -rf .project-parts
          rm -f .github/workflows/import-project.yml

      - name: Publicar código-fonte
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: adicionar site premium de advocacia"
          git push
